<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MPC Similaridade - AV02</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <main class="container">
    <section class="hero">
      <p class="tag">AV02 - Busca por Similaridade com LLM</p>
      <h1>MPC Search Engine</h1>
      <p class="subtitle">
        Pergunte sobre o projeto MPC (Musica Popular Carioca) e encontre os trechos mais relevantes.
      </p>
    </section>

    <section class="search-card">
      <form id="search-form">
        <label for="query">Sua pergunta</label>
        <textarea id="query" rows="3" placeholder="Ex.: Qual e a proposta do projeto MPC?"></textarea>

        <div class="controls">
          <button type="submit" id="search-btn">Buscar</button>
        </div>
      </form>
    </section>

    <section class="results-wrap">
      <div class="results-header">
        <h2>Resultados</h2>
        <span id="status">Aguardando consulta...</span>
      </div>
      <div id="results" class="results"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
