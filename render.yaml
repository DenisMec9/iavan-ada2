services:
  - type: web
    name: av02-mpc-search
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_NAME
        value: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - key: SEARCH_METRIC
        value: ip
